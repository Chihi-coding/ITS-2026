services:
  postgres:
    image: postgres:16-alpine
    container_name: smart_parking_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_parking
      POSTGRES_USER: parking_user
      POSTGRES_PASSWORD: parking_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smart_parking_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://parking_user:parking_pass@postgres:5432/smart_parking
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      - postgres
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
